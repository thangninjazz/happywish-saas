server {
    listen 80;
    server_name happywish.nvhomes.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name happywish.nvhomes.vn;

    ssl_certificate /etc/letsencrypt/live/happywish.nvhomes.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/happywish.nvhomes.vn/privkey.pem;

    # Nén Gzip cho performance
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    location / {
        proxy_pass http://web:3000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Security headers\n        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:;";\n        add_header X-Frame-Options "SAMEORIGIN";\n        add_header X-Content-Type-Options "nosniff";\n        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
